name: MyakuariAI
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 11.13.0

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.myakuariai
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  MyakuariAI:
    type: application
    platform: iOS
    sources: [MyakuariAI]
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: MyakuariAI/Info.plist
        PRODUCT_NAME: MyakuariAI
    info:
      path: MyakuariAI/Info.plist
      properties:
        CFBundleName: 脈ありAI
        CFBundleDisplayName: 脈ありAI
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSUserTrackingUsageDescription: "This app uses data for personalized ads."
        GADApplicationIdentifier: ca-app-pub-9404799280370656~5033830283
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
